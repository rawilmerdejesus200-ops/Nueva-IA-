<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma IA Multimodal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Barra Lateral -->
    <aside class="w-64 glass-panel m-4 p-6 flex flex-col justify-between">
        <div>
            <h1 class="text-xl font-bold mb-8 text-blue-400">Orquestador IA</h1>
            <nav class="space-y-4">
                <button class="w-full text-left px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-500 transition">Debate Multi-Agente</button>
                <button class="w-full text-left px-4 py-2 hover:bg-slate-700 rounded-lg transition">Generador Flux.1</button>
            </nav>
        </div>
        <div class="text-sm text-slate-400 border-t border-slate-700 pt-4">
            <p>Desarrollador:</p>
            <p class="font-semibold text-slate-200">Wilmer de Jesús Ramos Guzmán</p>
        </div>
    </aside>

    <!-- Área Principal de Chat -->
    <main class="flex-1 flex flex-col p-4 m-4 ml-0 glass-panel relative">
        
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6">
            <div class="text-center text-slate-500 mt-20">
                <h2 class="text-2xl font-bold text-slate-300 mb-2">Inicia un Debate Crítico</h2>
                <p>Gemini, Claude y Grok debatirán para darte la conclusión perfecta.</p>
            </div>
        </div>

        <div class="mt-4 flex gap-2 border-t border-slate-700 pt-4">
            <input type="text" id="user-input" class="flex-1 bg-slate-800 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Escribe tu prompt para las IAs...">
            <button onclick="enviarPrompt()" class="bg-blue-600 px-6 py-3 rounded-xl font-semibold hover:bg-blue-500 transition">Enviar</button>
        </div>
    </main>

    <script>
        async function enviarPrompt() {
            const inputEl = document.getElementById('user-input');
            const prompt = inputEl.value.trim();
            if (!prompt) return;

            const chatContainer = document.getElementById('chat-container');
            
            chatContainer.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-blue-600 text-white px-4 py-2 rounded-xl max-w-xl">${prompt}</div>
                </div>
            `;
            inputEl.value = '';

            const loadingId = 'loading-' + Date.now();
            chatContainer.innerHTML += `
                <div id="${loadingId}" class="flex justify-start text-slate-400 italic">
                    El Árbitro está coordinando el debate entre los agentes...
                </div>
            `;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('http://localhost:8000/debate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) throw new Error("Error en el servidor");
                const data = await response.json();

                document.getElementById(loadingId).remove();

                chatContainer.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-slate-700 text-slate-200 px-6 py-4 rounded-xl max-w-3xl border border-slate-600 shadow-lg">
                            <span class="text-xs font-bold text-blue-400 uppercase tracking-wider mb-2 block">Conclusión del Árbitro</span>
                            ${data.conclusion_arbitro}
                        </div>
                    </div>
                `;
                chatContainer.scrollTop = chatContainer.scrollHeight;

            } catch (error) {
                document.getElementById(loadingId).remove();
                chatContainer.innerHTML += `
                    <div class="text-red-400 text-sm">Error de conexión. Asegúrate de que el backend de Python esté corriendo en localhost:8000.</div>
                `;
            }
        }
    </script>
</body>
</html>
